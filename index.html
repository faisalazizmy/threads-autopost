<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Auto Post — Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; padding: 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .sub { color: #8b949e; font-size: 14px; margin-bottom: 32px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .badge { font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
    .ok { background: #1a3a2a; color: #3fb950; }
    .fail { background: #3a1a1a; color: #f85149; }
    .slot { font-size: 12px; color: #8b949e; }
    .time { font-size: 12px; color: #8b949e; }
    .text { font-size: 15px; line-height: 1.6; color: #c9d1d9; }
    .empty { text-align: center; color: #8b949e; padding: 60px 0; font-size: 15px; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
    .count { font-size: 13px; color: #8b949e; }
  </style>
</head>
<body>
  <h1>Threads Auto Post</h1>
  <p class="sub">@fsalz.wfh — status semua post yang dijadualkan</p>

  <div class="header-row">
    <span class="count" id="count"></span>
  </div>

  <div id="log"></div>

  <script>
    fetch('log.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const log = document.getElementById('log');
        const count = document.getElementById('count');
        const sorted = data.sort((a, b) => new Date(b.time) - new Date(a.time));
        count.textContent = sorted.length + ' post direkod';
        if (!sorted.length) {
          log.innerHTML = '<div class="empty">belum ada post lagi.</div>';
          return;
        }
        sorted.forEach(p => {
          const d = new Date(p.time);
          const timeStr = d.toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
          log.innerHTML += `
            <div class="card">
              <div class="top">
                <span class="slot">${p.slot || 'post'} — ${p.day || ''}</span>
                <span class="badge ${p.status === 'ok' ? 'ok' : 'fail'}">${p.status === 'ok' ? 'Berjaya' : 'Gagal'}</span>
              </div>
              <div class="text">${p.text}</div>
              <div class="time" style="margin-top:8px">${timeStr}</div>
            </div>`;
        });
      })
      .catch(() => {
        document.getElementById('log').innerHTML = '<div class="empty">log.json belum wujud. tunggu post pertama.</div>';
      });
  </script>
</body>
</html>
