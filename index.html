<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Auto Post — @fsalz.wfh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; padding: 24px; max-width: 720px; margin: 0 auto; }

    h1 { font-size: 18px; font-weight: 600; }
    .handle { color: #8b949e; font-size: 13px; margin-bottom: 28px; }

    .next-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
    .next-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
    .next-slot { font-size: 15px; font-weight: 600; color: #58a6ff; }
    .next-time { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .countdown { font-size: 28px; font-weight: 700; color: #3fb950; font-variant-numeric: tabular-nums; }

    .section-title { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; margin-top: 28px; }

    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .b-done { background: #1a3a2a; color: #3fb950; }
    .b-next { background: #0d1f3c; color: #58a6ff; }
    .b-upcoming { background: #21262d; color: #8b949e; }
    .b-fail { background: #3a1a1a; color: #f85149; }

    /* Calendar list */
    .cal-day { margin-bottom: 18px; }
    .cal-day-header { font-size: 12px; font-weight: 600; color: #e6edf3; padding: 6px 0 8px; border-bottom: 1px solid #21262d; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .cal-day-header.today-header { color: #58a6ff; }
    .cal-row { display: flex; align-items: flex-start; gap: 12px; padding: 7px 0; border-bottom: 1px solid #161b22; }
    .cal-time { font-size: 11px; color: #484f58; width: 36px; flex-shrink: 0; padding-top: 2px; font-family: monospace; }
    .cal-label { font-size: 11px; color: #6e7681; width: 60px; flex-shrink: 0; padding-top: 2px; }
    .cal-text { font-size: 13px; color: #c9d1d9; line-height: 1.5; flex: 1; }
    .cal-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .cal-row.is-done .cal-text { color: #8b949e; }
    .cal-row.is-next .cal-text { color: #e6edf3; }

    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-slot { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .card-text { font-size: 14px; line-height: 1.6; color: #c9d1d9; }
    .card-time { font-size: 11px; color: #8b949e; margin-top: 8px; }
    .card-stats { display: flex; gap: 14px; margin-top: 8px; font-size: 12px; color: #8b949e; }
    .stat { display: flex; align-items: center; gap: 4px; }
    .empty { text-align: center; color: #8b949e; padding: 40px 0; font-size: 14px; }

    .perf-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .perf-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 12px 14px; text-align: center; }
    .perf-val { font-size: 22px; font-weight: 700; color: #e6edf3; font-variant-numeric: tabular-nums; }
    .perf-label { font-size: 10px; color: #8b949e; margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

    .terminal { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; }
    .terminal-bar { background: #161b22; padding: 8px 14px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #30363d; }
    .terminal-dot { width: 10px; height: 10px; border-radius: 50%; }
    .terminal-title { font-size: 11px; color: #8b949e; margin-left: 6px; font-family: monospace; }
    .terminal-body { padding: 10px 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 2; }
    .tline { display: flex; gap: 10px; align-items: baseline; white-space: nowrap; overflow: hidden; }
    .tline .ts { color: #484f58; flex-shrink: 0; }
    .tline .ok { color: #3fb950; flex-shrink: 0; }
    .tline .fail { color: #f85149; flex-shrink: 0; }
    .tline .spin { color: #58a6ff; flex-shrink: 0; }
    .tline .dur { color: #6e7681; flex-shrink: 0; }
    .tline .trg { color: #8b949e; overflow: hidden; text-overflow: ellipsis; }
    .push-btn { margin-top: 8px; width: 100%; background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 6px; padding: 4px 0; font-size: 11px; cursor: pointer; transition: background .15s; }
    .push-btn:hover { background: #30363d; color: #e6edf3; }
    .push-btn:disabled { opacity: .4; cursor: not-allowed; }
    .push-btn.pushing { color: #58a6ff; border-color: #58a6ff; }
    .push-btn.pushed { color: #3fb950; border-color: #3fb950; }
    .push-btn.push-err { color: #f85149; border-color: #f85149; }
    .token-bar { background: #161b22; border: 1px solid #e3b341; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #e3b341; display: flex; align-items: center; gap: 10px; }
    .token-bar button { background: #e3b341; color: #0d1117; border: none; border-radius: 5px; padding: 3px 10px; font-size: 11px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Threads Auto Post</h1>
  <p class="handle">@fsalz.wfh — auto posting sistem <span style="opacity:.35;font-size:10px">v5.1</span></p>

  <div class="next-box">

  <script>
    const QUEUE = [
      "upah project pertama aku roti dan air je.\n\ntapi aku ambil jugak. dan benda paling berharga aku dapat bukan upah tu.\n\nmasa buat project tu aku belajar banyak gila. explore tools, cuba semua benda. walaupun upah roti, aku buat macam project beribu.\n\ndan hasil tu la jadi portfolio pertama aku. sebab dia, project seterusnya datang.\n\nuntuk permulaan, ilmu yang kau dapat lagi berharga dari duit yang kau dapat.\n\nkorang punya first project dulu macam mana?",
      "interview kerja pertama aku, aku bawa hardisk.\n\ntakde resume cantik. takde sijil nak tunjuk. aku terus tunjuk kerja dari situ.\n\ndiorang tengok, diam sekejap, terus tanya bila boleh start.\n\nkorang pernah dapat kerja sebab portfolio, bukan sebab resume?",
      "aku tak start freelance dengan target nak jadi fulltime pun.\n\njust nak duit lebih. buat bila ada masa lapang. takde tekanan.\n\ntapi sebab buat dengan enjoy, kerja jadi lagi baik. client happy, dapat refer ke orang lain.\n\nkorang start freelance sebab apa? duit, minat, atau terpaksa?",
      "aku perasan ada dua jenis client.\n\nsatu, yang nak jumpa depan depan atau kat ofis. dua, yang okay je meeting online.\n\npengalaman aku: client yang nak jumpa depan depan ni biasanya susah nak close. aku pun tak tahu kenapa. dah la keluar kos, duit minyak, masa perjalanan.\n\nsekarang semua meeting aku buat online dulu. jimat masa, dan aku boleh present hasil kerja dengan lebih baik atas skrin. lepas close baru decide nak jumpa ke tak. servis digital kan.\n\nkorang pernah perasan pattern ni ke?",
      "masalah aku dulu: aku minat buat banyak benda.\n\nanimation, game, design, web. semua aku cuba. semua aku ambil kalau ada orang tanya.\n\nrasa macam bagus sebab serba boleh. tapi bila orang tanya aku buat apa, aku jawab freelancer je. generic. tak ada siapa ingat.\n\nkorang jenis fokus satu benda ke minat banyak benda macam aku?",
      "aku tak pernah dapat kerja sebab sijil.\n\nselalu sebab orang tengok kerja aku terus. sijil aku ada. tapi tak pernah jadi faktor pun.\n\nkalau kau ada kerja yang boleh tunjuk, sijil jadi decoration je.\n\nsetuju ke tak? aku nak dengar pendapat korang.",
      "client tanya harga, aku tak bagi terus.\n\naku takde rate card. aku ajak online meeting 15 sampai 30 minit, aku panggil discovery call. masa tu aku present hasil kerja betul betul, sambil study business diorang.\n\nhabis meeting aku hantar custom quotation ikut apa yang aku belajar. bukan template.\n\ntrust dah terbina sebelum harga disebut. peluang dapat project sangat tinggi.\n\nkorang bagi harga terus atau meeting dulu?",
      "benda pelik yang aku belajar: client yang bayar mahal, lagi senang layan.\n\ndiorang describe details, tahu apa yang diorang nak. kerja jadi mudah sebab arah dah jelas.\n\nclient yang murah pulak selalunya baru nak start. serah kerja tanpa details. lepas siap baru demand macam macam, dan asyik berubah.\n\nharga murah tak bermaksud kerja senang. selalunya sebaliknya.\n\nkorang pernah kena tak? client paling murah, kerenah paling banyak?",
      "sebab aku minat, aku tak rasa penat walaupun kerja lama.\n\norang lain kena paksa buat overtime. aku buat overtime sendiri sebab nak polish lagi.\n\nbukan semua orang ada benda tu. dan bila client nampak perbezaan tu, diorang ingat kau.\n\nkorang pernah tak sedar dah kerja berjam-jam sebab seronok?",
      "bertahun aku buat animation, design, web, game.\n\nsetiap client kenal aku beza. portfolio bersepah. aku sendiri tak tahu describe diri sebagai apa.\n\nlepas tu aku perhatikan dua benda: apa yang aku paling enjoy, dan apa yang orang paling kerap minta. dari situ jumpa satu servis yang gabung semua minat aku.\n\nsekarang asal orang sebut servis tu, terus ingat nama aku.\n\nkorang dah jumpa benda korang atau masih explore?",
      "perasaan bila orang mula associate nama kau dengan satu benda, lain macam sikit.\n\ndulu orang tanya aku buat apa, aku explain panjang. diorang confused.\n\nlepas aku fokus satu benda, aku jawab satu ayat je. diorang faham terus.\n\nkalau korang kena describe diri korang dalam satu ayat, apa ayat dia?",
      "aku masih buat project yang takde siapa bayar. sampai sekarang.\n\nbukan sebab takde kerja. tapi itu cara aku kekal sharp. takde constraint, boleh explore sesuka hati. dari situ aku jumpa teknik baru, tools baru. bila apply kat kerja client, quality naik.\n\nkalau tunggu client dulu baru nak belajar, kau selalu satu langkah di belakang.\n\nkorang last buat personal project bila?",
      "orang selalu kata jangan buat kerja yang kau suka, nanti hilang minat.\n\naku tak setuju.\n\naku buat kerja yang aku minat dari dulu sampai sekarang. sebab tu aku boleh buat lagi baik dari orang yang buat sebab duit je.\n\nminat tak hilang bila kau buat kerja. minat hilang bila kau buat kerja yang salah.\n\nkorang team mana: kerja ikut minat, atau minat jangan jadikan kerja?",
      "hampir semua client aku datang dari referral.\n\nkawan refer. company lama refer. orang yang pernah tengok kerja aku refer. aku tak pergi cari pun.\n\ntapi masalahnya referral tak consistent. ada bulan banyak, ada bulan senyap. dan aku tak boleh control bila diorang datang.\n\nkorang punya client selalu datang dari mana?",
      "setiap project aku buat lebih dari yang client minta. bukan untuk client tu. untuk aku sendiri.\n\nsebab hasil kerja tu bukan sekadar deliverable. dia jadi portfolio aku, bahan cerita aku, sebab orang refer aku.\n\nclient bayar sekali je. tapi portfolio yang terhasil, aku guna berkali kali untuk tahun tahun akan datang. effort lebih tu bukan free work. tu investment.\n\nkorang siapkan kerja sekadar siap, atau sampai jadi showcase?",
      "benda paling aku struggle sampai sekarang bukan skill.\n\nbukan cari client. bukan bayaran. tapi consistency.\n\nada masa aku productive gila, siap kerja berlambak. ada masa aku procrastinate sampai deadline dah dekat baru gerak.\n\nkorang struggle dengan apa paling banyak? jom confess sini.",
      "kalau boleh balik masa, aku nak cakap satu benda je dengan diri sendiri yang dulu.\n\nfokus lagi awal.\n\nbukan maksud tak boleh explore. explore kena. tapi kena ada satu anchor yang ikat semua tu. tanpa anchor, kau spend bertahun buat banyak benda tapi tak pergi mana.\n\nkorang nak cakap apa dengan diri sendiri 5 tahun lepas?",
      "aku share pasal freelance bukan sebab dah berjaya. aku masih dalam proses.\n\nmula dengan kerja free upah roti dan air. interview bawa hardisk. bertahun buat macam macam sampai portfolio bersepah. perlahan lahan jumpa fokus. tapi consistency masih jadi cabaran.\n\nramai aku rasa sama situasi. skill ada, minat ada, tapi tak tahu arah. kita figure out sama sama.\n\napa benda paling besar korang struggle sekarang?",
      "spark aku datang dari dua benda yang berlaku serentak.\n\nmak aku cikgu. ada laptop. aku explore teknologi, tengok apa yang boleh aku hasilkan dengan benda tu.\n\nmakcik aku belajar multimedia. aku tengok dia buat kerja.\n\nvideo pertama aku buat untuk sepupu sendiri. guna je tools yang ada dalam laptop tu. tak tunggu semua cukup dulu.\n\ncara orang dapat spark memang beza. tapi cara guna dia sama: mula dengan apa yang ada depan mata.\n\nkorang punya spark datang dari mana? aku nak baca semua.",
      "aku pernah ambil kerja murah sebab minat sangat nak buat.\n\nbayaran tak seberapa. tapi aku buat lebih 100%. explore tools baru, polish sampai puas hati sendiri.\n\nkerja tu jadi showcase terbaik dalam portfolio aku. dan dari situ dapat tawaran lagi tinggi.\n\npernah tak korang buat kerja yang usaha lebih dari bayaran? berbaloi ke?",
      "dulu bila client reject kerja tanpa sebab, aku terus refund. malas nak pening.\n\ntapi lepas tu aku belajar: document semua benda. setiap progress, setiap request, setiap approval. dalam whatsapp, email. project besar aku siap buat website khas untuk client tengok progress.\n\nsekarang kalau client bantah, aku tunjuk record je. tak payah gaduh.\n\nkorang pernah kena client macam ni? macam mana handle?",
    ];

    const SLOTS = [
      { key: 'pagi',  label: 'Pagi',  hour: 8 },
      { key: 'malam', label: 'Malam', hour: 21 },
    ];

    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function getMYTime() {
      return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kuala_Lumpur' }));
    }

    function getNextSlot() {
      const now = getMYTime();
      const totalMs = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()) * 1000;
      const slotMs = SLOTS.map(s => s.hour * 3600 * 1000);
      for (let i = 0; i < slotMs.length; i++) {
        if (totalMs < slotMs[i]) {
          return { slot: SLOTS[i], msUntil: slotMs[i] - totalMs };
        }
      }
      const msLeft = 24 * 3600 * 1000 - totalMs;
      return { slot: SLOTS[0], msUntil: msLeft + 8 * 3600 * 1000 };
    }

    function formatCountdown(ms) {
      if (ms <= 0) return '00:00:00';
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      return [h,m,s].map(v => String(v).padStart(2,'0')).join(':');
    }

    let nextInfo = getNextSlot();
    let schedPaused = false;

    function setSchedPaused(paused) {
      schedPaused = paused;
      if (paused) {
        document.getElementById('next-slot-name').textContent = 'Schedule Dihentikan';
        document.getElementById('next-slot-time').textContent = 'Auto post tidak aktif';
        document.getElementById('countdown').textContent = '--:--:--';
        document.getElementById('countdown').style.color = '#f85149';
      } else {
        document.getElementById('countdown').style.color = '#3fb950';
        updateCountdown();
      }
    }

    function updateCountdown() {
      if (schedPaused) return;
      nextInfo = getNextSlot();
      const { slot, msUntil } = nextInfo;
      document.getElementById('next-slot-name').textContent = slot.label + ' — ' + slot.hour + ':00';
      const eta = new Date(Date.now() + msUntil);
      document.getElementById('next-slot-time').textContent = 'pukul ' + eta.toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur', hour: '2-digit', minute: '2-digit' });
      document.getElementById('countdown').textContent = formatCountdown(msUntil);
    }

    function buildSchedule(logs) {
      const now = getMYTime();
      const cal = document.getElementById('schedule-cal');

      const postedIdx = new Set(logs.filter(l => l.status === 'ok' && l.idx !== undefined).map(l => l.idx));
      const upcoming = [];
      for (let i = 0; i < QUEUE.length; i++) {
        if (!postedIdx.has(i)) upcoming.push({ idx: i, text: QUEUE[i] });
      }
      let qPtr = 0;

      const logMap = {};
      logs.forEach(l => {
        if (l.date) logMap[l.date + '|' + l.slot] = l;
      });

      const fmtDate = dt => dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');

      cal.innerHTML = '';
      for (let d = 0; d < 7; d++) {
        const date = new Date(now);
        date.setDate(date.getDate() + d);
        const isToday = d === 0;
        const dateLabel = date.toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'long' });

        let rowsHtml = '';
        SLOTS.forEach(s => {
          const logEntry = logMap[fmtDate(date) + '|' + s.key];
          const nowHour = now.getHours();
          const isPast = isToday && (nowHour > s.hour || (nowHour === s.hour && now.getMinutes() > 5));
          const btnId = `pushbtn-${d}-${s.key}`;
          let rowCls = 'cal-row', badge = '', pushBtn = '', preview;

          if (logEntry && logEntry.status === 'ok') {
            rowCls += ' is-done';
            badge = '<span class="badge b-done">✓</span>';
            preview = logEntry.text;
          } else {
            const item = upcoming[qPtr];
            if (item) {
              preview = '<span style="opacity:.45">#' + (item.idx + 1) + '</span> ' + item.text;
              qPtr++;
            } else {
              preview = 'Queue habis. Tambah content baru.';
            }
            if (logEntry && logEntry.status === 'fail') {
              badge = '<span class="badge b-fail">Gagal</span>';
            } else if (isToday && isPast) {
              badge = '<span class="badge b-fail">Terlepas</span>';
            }
            if (item) {
              pushBtn = `<button class="push-btn" id="${btnId}" onclick="triggerSlot('${s.key}','${btnId}')">▶ Post sekarang</button>`;
            }
          }

          rowsHtml += `
            <div class="${rowCls}">
              <div class="cal-time">${String(s.hour).padStart(2,'0')}:00</div>
              <div class="cal-label">${s.label}</div>
              <div class="cal-text">${preview}</div>
              <div class="cal-right">${badge}${pushBtn}</div>
            </div>`;
        });

        cal.innerHTML += `
          <div class="cal-day">
            <div class="cal-day-header ${isToday ? 'today-header' : ''}">
              <span>${dateLabel}</span>
              ${isToday ? '<span style="font-size:11px;opacity:.6">Hari ini</span>' : ''}
            </div>
            ${rowsHtml}
          </div>`;
      }
    }

    function buildLog(logs) {
      const logEl = document.getElementById('log');
      const sorted = [...logs].sort((a,b) => new Date(b.time) - new Date(a.time));
      if (!sorted.length) { logEl.innerHTML = '<div class="empty">belum ada post lagi.</div>'; return; }
      logEl.innerHTML = '';
      sorted.forEach(p => {
        const raw = p.time + (p.time.includes('Z') ? '' : 'Z');
        const d = new Date(raw);
        const timeStr = d.toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        const isOk = p.status === 'ok';
        logEl.innerHTML += `
          <div class="card">
            <div class="card-top">
              <span class="card-slot"><span class="dot" style="background:${isOk?'#3fb950':'#f85149'}"></span>${p.slot || 'post'} — ${p.day || ''}</span>
              <span class="badge ${isOk ? 'b-done' : 'b-fail'}">${isOk ? 'Berjaya' : 'Gagal'}</span>
            </div>
            <div class="card-text">${p.text}</div>
            ${p.views !== undefined ? `
            <div class="card-stats">
              <span class="stat">👁 ${p.views ?? 0}</span>
              <span class="stat">❤️ ${p.likes ?? 0}</span>
              <span class="stat">💬 ${p.replies ?? 0}</span>
              <span class="stat">🔁 ${p.reposts ?? 0}</span>
              <span class="stat">❝ ${p.quotes ?? 0}</span>
            </div>` : '<div class="card-stats" style="color:#484f58;font-size:11px">stats belum ada</div>'}
            <div class="card-time">${timeStr}</div>
          </div>`;
      });
    }

    function buildPerf(logs) {
      const ok = logs.filter(l => l.status === 'ok');
      const fmt = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
      document.getElementById('p-posts').textContent = ok.length;
      document.getElementById('p-views').textContent = fmt(ok.reduce((s,l) => s+(l.views||0), 0));
      document.getElementById('p-replies').textContent = fmt(ok.reduce((s,l) => s+(l.replies||0), 0));
    }

    function buildRuns(runs) {
      const el = document.getElementById('runs');
      if (!runs.length) { el.innerHTML = '<span style="color:#484f58">tiada run lagi.</span>'; return; }
      const triggerMap = { schedule: 'schedule', workflow_dispatch: 'cron-job.org', push: 'push' };
      el.innerHTML = runs.slice(0, 12).map(r => {
        const created = new Date(r.created_at);
        const dur = r.status === 'completed' ? Math.round((new Date(r.updated_at) - created) / 1000) : null;
        const ts = created.toLocaleString('en-GB', { timeZone: 'Asia/Kuala_Lumpur', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }).replace(',','');
        const isRunning = r.status !== 'completed';
        const isOk = r.conclusion === 'success';
        const icon = isRunning ? `<span class="spin">⟳</span>` : (isOk ? `<span class="ok">✓</span>` : `<span class="fail">✗</span>`);
        const durStr = dur !== null ? `<span class="dur">${dur}s</span>` : `<span class="spin">...</span>`;
        const trg = triggerMap[r.event] || r.event;
        return `<div class="tline">${icon} <span class="ts">${ts}</span> ${durStr} <span class="trg">${trg}</span></div>`;
      }).join('');
    }

    // Token management
    const TOKEN_KEY = 'gh_pat';
    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function setToken() {
      const t = prompt('Masuk GitHub PAT token:');
      if (t && t.trim()) {
        localStorage.setItem(TOKEN_KEY, t.trim());
        checkTokenBar();
      }
    }
    function checkTokenBar() {
      const bar = document.getElementById('token-bar');
      if (getToken()) {
        bar.style.display = 'none';
      } else {
        bar.style.display = 'flex';
      }
    }

    async function triggerSlot(slot, btnId) {
      const token = getToken();
      if (!token) { setToken(); return; }
      const btn = document.getElementById(btnId || 'pushbtn-0-' + slot);
      if (!btn) return;
      btn.disabled = true;
      btn.className = 'push-btn pushing';
      btn.textContent = '⟳ Triggering...';
      try {
        const r = await fetch('https://api.github.com/repos/faisalazizmy/threads-autopost/actions/workflows/autopost.yml/dispatches', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: 'main', inputs: { force_slot: slot } })
        });
        if (r.status === 204) {
          btn.className = 'push-btn pushed';
          btn.textContent = '✓ Triggered!';
          setTimeout(() => { btn.textContent = '▶ Post sekarang'; btn.className = 'push-btn'; btn.disabled = false; }, 5000);
        } else if (r.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          btn.className = 'push-btn push-err';
          btn.textContent = '✗ Token invalid — klik semula';
          btn.disabled = false;
        } else {
          btn.className = 'push-btn push-err';
          btn.textContent = '✗ Error ' + r.status;
          setTimeout(() => { btn.textContent = '▶ Post sekarang'; btn.className = 'push-btn'; btn.disabled = false; }, 4000);
        }
      } catch(e) {
        btn.className = 'push-btn push-err';
        btn.textContent = '✗ Gagal';
        btn.disabled = false;
      }
    }

    checkTokenBar();
    updateCountdown();
    setInterval(updateCountdown, 1000);

    const RUNS_CACHE_KEY = 'gh_runs_cache';
    const RUNS_CACHE_TTL = 5 * 60 * 1000; // 5 minit
    const cached = JSON.parse(localStorage.getItem(RUNS_CACHE_KEY) || 'null');
    if (cached && Date.now() - cached.ts < RUNS_CACHE_TTL) {
      buildRuns(cached.runs);
    } else {
      fetch('https://api.github.com/repos/faisalazizmy/threads-autopost/actions/runs?per_page=12')
        .then(r => r.json())
        .then(data => {
          if (data.workflow_runs) {
            localStorage.setItem(RUNS_CACHE_KEY, JSON.stringify({ ts: Date.now(), runs: data.workflow_runs }));
            buildRuns(data.workflow_runs);
          } else {
            const msg = data.message || JSON.stringify(data);
            document.getElementById('runs').innerHTML = `<span style="color:#f85149">${msg}</span>`;
          }
        })
        .catch(e => { document.getElementById('runs').innerHTML = `<span style="color:#f85149">fetch error: ${e.message}</span>`; });
    }

    async function toggleSchedule() {
      const token = getToken();
      if (!token) { setToken(); return; }
      const btn = document.getElementById('sched-btn');
      btn.disabled = true;
      btn.textContent = '...';

      const base = 'https://api.github.com/repos/faisalazizmy/threads-autopost/actions/workflows/autopost.yml';
      const headers = { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' };

      // check current state
      const res = await fetch(base, { headers });
      const wf = await res.json();
      const isActive = wf.state === 'active';

      // toggle
      await fetch(`${base}/${isActive ? 'disable' : 'enable'}`, { method: 'PUT', headers });

      btn.disabled = false;
      if (isActive) {
        btn.textContent = '▶ Resume Schedule';
        btn.style.color = '#f85149';
        btn.style.borderColor = '#f85149';
        setSchedPaused(true);
      } else {
        btn.textContent = '⏸ Stop Schedule';
        btn.style.color = '#8b949e';
        btn.style.borderColor = '#30363d';
        setSchedPaused(false);
      }
    }

    async function initSchedBtn() {
      const token = getToken();
      if (!token) return;
      const btn = document.getElementById('sched-btn');
      const res = await fetch('https://api.github.com/repos/faisalazizmy/threads-autopost/actions/workflows/autopost.yml', {
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
      });
      const wf = await res.json();
      if (wf.state !== 'active') {
        btn.textContent = '▶ Resume Schedule';
        btn.style.color = '#f85149';
        btn.style.borderColor = '#f85149';
        setSchedPaused(true);
      }
    }

    function refreshLog() {
      const btn = document.getElementById('refresh-btn');
      btn.textContent = '↻ ...';
      btn.disabled = true;
      fetch('log.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => { buildSchedule(data); buildLog(data); buildPerf(data); btn.textContent = '↻ Refresh'; btn.disabled = false; })
        .catch(() => { btn.textContent = '↻ Refresh'; btn.disabled = false; });
    }

    refreshLog();
    initSchedBtn();
  </script>
</body>
</html>
