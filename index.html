<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Auto Post — @fsalz.wfh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; padding: 24px; max-width: 720px; margin: 0 auto; }

    h1 { font-size: 18px; font-weight: 600; }
    .handle { color: #8b949e; font-size: 13px; margin-bottom: 28px; }

    .next-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
    .next-label { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
    .next-slot { font-size: 15px; font-weight: 600; color: #58a6ff; }
    .next-time { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .countdown { font-size: 28px; font-weight: 700; color: #3fb950; font-variant-numeric: tabular-nums; }

    .section-title { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; margin-top: 28px; }

    .schedule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .slot-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 16px; }
    .slot-card.done { border-color: #238636; }
    .slot-card.next { border-color: #58a6ff; background: #0c1829; }
    .slot-card.failed { border-color: #da3633; }
    .slot-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .slot-name { font-size: 13px; font-weight: 600; }
    .slot-time-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
    .slot-script { font-size: 10px; color: #484f58; font-family: monospace; margin-bottom: 4px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .b-done { background: #1a3a2a; color: #3fb950; }
    .b-next { background: #0d1f3c; color: #58a6ff; }
    .b-upcoming { background: #21262d; color: #8b949e; }
    .b-fail { background: #3a1a1a; color: #f85149; }
    .slot-preview { font-size: 12px; color: #8b949e; line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-slot { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .card-text { font-size: 14px; line-height: 1.6; color: #c9d1d9; }
    .card-time { font-size: 11px; color: #8b949e; margin-top: 8px; }
    .card-stats { display: flex; gap: 14px; margin-top: 8px; font-size: 12px; color: #8b949e; }
    .stat { display: flex; align-items: center; gap: 4px; }
    .empty { text-align: center; color: #8b949e; padding: 40px 0; font-size: 14px; }

    .run-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 18px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .run-card.ok { border-left: 3px solid #238636; }
    .run-card.fail { border-left: 3px solid #da3633; }
    .run-card.running { border-left: 3px solid #58a6ff; }
    .run-left { flex: 1; min-width: 0; }
    .run-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-meta { font-size: 11px; color: #8b949e; margin-top: 3px; }
    .run-trigger { font-size: 10px; color: #484f58; font-family: monospace; margin-top: 2px; }
    .run-duration { font-size: 12px; color: #8b949e; text-align: right; white-space: nowrap; }
  </style>
</head>
<body>
  <h1>Threads Auto Post</h1>
  <p class="handle">@fsalz.wfh — auto posting sistem</p>

  <div class="next-box">
    <div>
      <div class="next-label">Post seterusnya</div>
      <div class="next-slot" id="next-slot-name">—</div>
      <div class="next-time" id="next-slot-time"></div>
    </div>
    <div class="countdown" id="countdown">--:--:--</div>
  </div>

  <div class="section-title">Jadual Hari Ini</div>
  <div class="schedule-grid" id="schedule-grid"></div>

  <div class="section-title">GitHub Actions Log</div>
  <div id="runs"><div class="empty">memuatkan...</div></div>

  <div class="section-title">History Post</div>
  <div id="log"><div class="empty">memuatkan...</div></div>

  <script>
    const POSTS = {
      Monday:    { pagi: "korang pernah tak terfikir nak buat duit sendiri dari rumah tapi tak tahu nak buat apa.", tengahari: "kau dah tahu buat benda ni. dah buat untuk diri sendiri, untuk kawan. tapi bila ada orang tanya berapa harga, kau blank.", malam: "tak kisah kau ada skill ke tak lagi, langkah pertama sama je. kena tahu dulu kau nak bantu siapa." },
      Tuesday:   { pagi: "kalau kau kena cari RM500 dalam masa seminggu guna laptop je, tanpa keluar rumah, kau akan buat apa?", tengahari: "ramai yang dah ada skill digital tapi masih apply kerja gaji RM1,500. bukan sebab skill tak bernilai.", malam: "orang yang dapat client bukan selalu yang paling pandai. selalu yang paling berani offer diri dulu." },
      Wednesday: { pagi: "apa yang paling buat korang rasa takut nak mula buat duit sendiri secara digital?", tengahari: "tak ada skill pun boleh mula sekarang. pilih satu benda yang kau nak belajar, luangkan 2 jam sehari.", malam: "kalau tak tahu nak charge berapa, tengok orang lain dalam niche yang sama charge apa." },
      Thursday:  { pagi: "pernah tak rasa skill kau tu biasa je, sampai rasa tak layak charge mahal.", tengahari: "belajar skill digital sekarang lagi senang dari 10 tahun dulu. semua ada kat YouTube, percuma.", malam: "dua orang start freelance sama masa. sorang research 3 bulan. sorang lagi terus hantar offer, dapat client minggu ketiga." },
      Friday:    { pagi: "kalau kau boleh buat RM3,000 sebulan dari rumah guna laptop, skill apa yang kau rasa paling berpotensi?", tengahari: "tak perlu website cantik, logo professional, atau business card untuk start ambik client.", malam: "tiga benda yang buat client pilih kau walaupun kau baru start. faham masalah, balas cepat, buat apa yang dijanjikan." },
      Saturday:  { pagi: "setuju tak, ramai Malaysian ada skill tapi takut nak jual diri sendiri?", tengahari: "rasa macam semua orang dah jauh depan tu normal. padahal 6 bulan lepas diorang pun duduk tempat yang sama.", malam: "ada dua jenis orang dengan skill yang sama. sorang tunggu orang perasan. sorang lagi pergi bagitau orang." },
      Sunday:    { pagi: "kalau dapat RM1,000 pertama dari skill digital, benda pertama apa yang korang nak buat?", tengahari: "tak ada skill pun okay. ada skill tapi tak tahu jual pun okay. yang tak okay bila kau biarkan hari berlalu.", malam: "pilih satu skill, bagitau satu orang kau boleh bantu diorang. bukan plan panjang yang kau perlukan. satu langkah kecil." }
    };

    const THREADS = {
      Monday: "cara dapat client pertama tanpa pengalaman, tanpa portfolio, tanpa keluar rumah.",
      Tuesday: "skill ada, masa ada, laptop ada. tapi income dari freelance masih sifar.",
      Wednesday: "tak ada skill pun boleh start freelance. tapi kena tahu dulu nak belajar apa.",
      Thursday: "ramai freelancer baru buat kesilapan yang sama bila set harga.",
      Friday: "cara present diri sebagai freelancer supaya client percaya kau, walaupun kau baru start.",
      Saturday: "tiga sebab kenapa orang ada skill tapi masih tak dapat client.",
      Sunday: "minggu ni kita belajar banyak pasal freelance. tapi aku nak tanya satu soalan je."
    };

    const SLOTS = [
      { key: 'pagi',      label: 'Pagi',      hour: 8,  script: 'post_today.py pagi' },
      { key: 'thread',    label: 'Thread',    hour: 12, script: 'thread_today.py' },
      { key: 'tengahari', label: 'Tengahari', hour: 13, script: 'post_today.py tengahari' },
      { key: 'malam',     label: 'Malam',     hour: 21, script: 'post_today.py malam' },
    ];

    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function getMYTime() {
      return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kuala_Lumpur' }));
    }

    function getNextSlot() {
      const now = getMYTime();
      const totalMs = (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()) * 1000;
      const slotMs = [8*3600, 12*3600, 13*3600, 21*3600].map(s => s * 1000);
      for (let i = 0; i < slotMs.length; i++) {
        if (totalMs < slotMs[i]) {
          return { slot: SLOTS[i], msUntil: slotMs[i] - totalMs };
        }
      }
      const msLeft = 24 * 3600 * 1000 - totalMs;
      return { slot: SLOTS[0], msUntil: msLeft + 8 * 3600 * 1000 };
    }

    function formatCountdown(ms) {
      if (ms <= 0) return '00:00:00';
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      return [h,m,s].map(v => String(v).padStart(2,'0')).join(':');
    }

    let nextInfo = getNextSlot();

    function updateCountdown() {
      nextInfo = getNextSlot();
      const { slot, msUntil } = nextInfo;
      document.getElementById('next-slot-name').textContent = slot.label + ' — ' + slot.hour + ':00';
      const eta = new Date(Date.now() + msUntil);
      document.getElementById('next-slot-time').textContent = 'pukul ' + eta.toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur', hour: '2-digit', minute: '2-digit' });
      document.getElementById('countdown').textContent = formatCountdown(msUntil);
    }

    function buildSchedule(logs) {
      const now = getMYTime();
      const hour = now.getHours();
      const dayName = DAYS[now.getDay()];
      const grid = document.getElementById('schedule-grid');
      const { slot: nextSlot } = getNextSlot();

      const loggedToday = {};
      logs.forEach(l => {
        const d = new Date(l.time + (l.time.includes('Z') ? '' : 'Z'));
        const lDay = DAYS[d.getDay()];
        const nowDate = getMYTime();
        const lMY = new Date(d.toLocaleString('en-US', { timeZone: 'Asia/Kuala_Lumpur' }));
        if (lMY.toDateString() === nowDate.toDateString()) {
          loggedToday[l.slot] = l.status;
        }
      });

      grid.innerHTML = '';
      SLOTS.forEach(s => {
        const isNext = s.key === nextSlot.key;
        const logStatus = loggedToday[s.key];
        const isPast = hour > s.hour || (hour === s.hour && now.getMinutes() > 10);

        let cls = 'slot-card';
        let badgeClass = 'b-upcoming', badgeText = 'Akan datang';

        if (logStatus === 'ok')   { cls += ' done';   badgeClass = 'b-done';     badgeText = 'Berjaya'; }
        else if (logStatus === 'fail') { cls += ' failed'; badgeClass = 'b-fail'; badgeText = 'Gagal'; }
        else if (isNext)          { cls += ' next';   badgeClass = 'b-next';     badgeText = 'Seterusnya'; }

        const preview = s.key === 'thread'
          ? (THREADS[dayName] || '—')
          : (POSTS[dayName]?.[s.key] || '—');

        grid.innerHTML += `
          <div class="${cls}">
            <div class="slot-top">
              <span class="slot-name">${s.label}</span>
              <span class="badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="slot-time-label">${s.hour}:00</div>
            <div class="slot-script">${s.script}</div>
            <div class="slot-preview">${preview}</div>
          </div>`;
      });
    }

    function buildLog(logs) {
      const logEl = document.getElementById('log');
      const sorted = [...logs].sort((a,b) => new Date(b.time) - new Date(a.time));
      if (!sorted.length) { logEl.innerHTML = '<div class="empty">belum ada post lagi.</div>'; return; }
      logEl.innerHTML = '';
      sorted.forEach(p => {
        const raw = p.time + (p.time.includes('Z') ? '' : 'Z');
        const d = new Date(raw);
        const timeStr = d.toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        const isOk = p.status === 'ok';
        logEl.innerHTML += `
          <div class="card">
            <div class="card-top">
              <span class="card-slot"><span class="dot" style="background:${isOk?'#3fb950':'#f85149'}"></span>${p.slot || 'post'} — ${p.day || ''}</span>
              <span class="badge ${isOk ? 'b-done' : 'b-fail'}">${isOk ? 'Berjaya' : 'Gagal'}</span>
            </div>
            <div class="card-text">${p.text}</div>
            ${p.views !== undefined ? `
            <div class="card-stats">
              <span class="stat">👁 ${p.views ?? 0}</span>
              <span class="stat">❤️ ${p.likes ?? 0}</span>
              <span class="stat">💬 ${p.replies ?? 0}</span>
              <span class="stat">🔁 ${p.reposts ?? 0}</span>
              <span class="stat">❝ ${p.quotes ?? 0}</span>
            </div>` : '<div class="card-stats" style="color:#484f58;font-size:11px">stats belum ada</div>'}
            <div class="card-time">${timeStr}</div>
          </div>`;
      });
    }

    function buildRuns(runs) {
      const el = document.getElementById('runs');
      if (!runs.length) { el.innerHTML = '<div class="empty">tiada run lagi.</div>'; return; }
      el.innerHTML = '';
      runs.slice(0, 10).forEach(r => {
        const created = new Date(r.created_at);
        const updated = new Date(r.updated_at);
        const dur = r.status === 'completed' ? Math.round((updated - created) / 1000) : null;
        const timeStr = created.toLocaleString('ms-MY', { timeZone: 'Asia/Kuala_Lumpur', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

        const isOk = r.conclusion === 'success';
        const isRunning = r.status !== 'completed';
        const cls = isRunning ? 'running' : (isOk ? 'ok' : 'fail');
        const badge = isRunning ? 'b-next' : (isOk ? 'b-done' : 'b-fail');
        const label = isRunning ? 'Running...' : (isOk ? 'Berjaya' : 'Gagal');

        const triggerMap = { schedule: 'GitHub Schedule', workflow_dispatch: 'cron-job.org / Manual', push: 'Push' };
        const triggerLabel = triggerMap[r.event] || r.event;

        el.innerHTML += `
          <div class="run-card ${cls}">
            <div class="run-left">
              <div class="run-title">${r.display_title || r.name}</div>
              <div class="run-meta">${timeStr} · <span class="badge ${badge}" style="font-size:10px">${label}</span></div>
              <div class="run-trigger">trigger: ${triggerLabel}</div>
            </div>
            <div class="run-duration">${dur !== null ? dur + 's' : '⏳'}</div>
          </div>`;
      });
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    fetch('https://api.github.com/repos/faisalazizmy/threads-autopost/actions/runs?per_page=10')
      .then(r => r.json())
      .then(data => buildRuns(data.workflow_runs || []))
      .catch(() => { document.getElementById('runs').innerHTML = '<div class="empty">gagal muatkan runs.</div>'; });

    fetch('log.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => { buildSchedule(data); buildLog(data); })
      .catch(() => { buildSchedule([]); document.getElementById('log').innerHTML = '<div class="empty">belum ada post lagi.</div>'; });
  </script>
</body>
</html>
