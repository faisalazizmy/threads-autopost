name: Threads Auto Post

on:
  # PAUSED — uncomment to resume auto-schedule
  # schedule:
  #   - cron: '0 0 * * *'   # 8am Malaysia (UTC+8)
  #   - cron: '0 4 * * *'   # 12pm Malaysia
  #   - cron: '0 5 * * *'   # 1pm Malaysia
  #   - cron: '0 13 * * *'  # 9pm Malaysia
  workflow_dispatch:
    inputs:
      force_slot:
        description: 'Force slot (pagi/thread/tengahari/malam). Kosong = auto detect by hour.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot and run
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: |
          FORCE="${{ github.event.inputs.force_slot }}"
          HOUR=$(TZ=Asia/Kuala_Lumpur date +%H)
          SLOT="${FORCE:-}"
          if [ -z "$SLOT" ]; then
            if [ "$HOUR" = "08" ]; then SLOT="pagi"
            elif [ "$HOUR" = "12" ]; then SLOT="thread"
            elif [ "$HOUR" = "13" ]; then SLOT="tengahari"
            elif [ "$HOUR" = "21" ]; then SLOT="malam"
            else echo "Tiada slot untuk jam $HOUR MYT — skip."; exit 0
            fi
          fi
          echo "Running slot: $SLOT"
          if [ "$SLOT" = "thread" ]; then
            python thread_today.py
          else
            python post_today.py $SLOT
          fi

      - name: Fetch insights
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python fetch_insights.py

      - name: Commit log
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add log.json
          git diff --staged --quiet || git commit -m "log: update post history + insights"
          git push
