name: Threads Auto Post

on:
  schedule:
    - cron: '0 0 * * *'   # 8am Malaysia (UTC+8)
    - cron: '0 4 * * *'   # 12pm Malaysia
    - cron: '0 5 * * *'   # 1pm Malaysia
    - cron: '0 13 * * *'  # 9pm Malaysia
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot and run
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: |
          HOUR=$(TZ=Asia/Kuala_Lumpur date +%H)
          echo "Malaysia time hour: $HOUR"
          if [ "$HOUR" = "08" ]; then
            python post_today.py pagi
          elif [ "$HOUR" = "12" ]; then
            python thread_today.py
          elif [ "$HOUR" = "13" ]; then
            python post_today.py tengahari
          elif [ "$HOUR" = "21" ]; then
            python post_today.py malam
          else
            echo "Manual trigger — running tengahari"
            python post_today.py tengahari
          fi

      - name: Commit log
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add log.json
          git diff --staged --quiet || git commit -m "log: update post history"
          git push
